<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caption Lab - CreatorOS AI</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f9fc;
padding:20px;
margin:0;
}

.card{
background:white;
padding:20px;
border-radius:20px;
max-width:800px;
margin:auto;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

h1{
color:#00b7ff;
}

textarea{
width:100%;
height:120px;
padding:12px;
border-radius:12px;
border:1px solid #ddd;
margin-top:10px;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
background:#00c2ff;
color:white;
font-weight:bold;
border-radius:12px;
cursor:pointer;
}

.output{
margin-top:20px;
padding:15px;
background:#f8fbfd;
border-radius:12px;
border:2px dashed #00c2ff;
}
</style>
</head>

<body>

<div class="card">
<h1>Caption Lab ✨</h1>

<textarea id="topic" placeholder="Topic likho..."></textarea>

<button onclick="generateCaption()">
Generate Caption
</button>

<div class="output" id="output">
Generated caption yahan dikhega.
</div>
</div>
<script>
function generateCaption(){

let topic=document.getElementById("topic").value.trim();

if(topic===""){
document.getElementById("output").innerHTML="⚠️ Pehle topic likho.";
return;
}

let captions=[

`🔥 ${topic}

Ye moment sach me discuss karne layak hai. Har kisi ka is par alag reaction hai aur isi wajah se ye itna trend kar raha hai.

Tumhara opinion kya hai? Comment me zaroor batao 👇

#viral #trending #explorepage #creator #contentcreator #reels #instagram #fyp #viralpost #trend`,

`✨ ${topic}

Kabhi kabhi ek choti si update bhi poori community ka attention le leti hai. Ye bhi unhi moments me se ek hai.

Agar tum bhi is topic ko follow karte ho to post save karo aur share karo 🚀

#viralreels #trendingnow #explore #socialmedia #viralcontent #reelitfeelit #instadaily #creatoros #growth`,

`🚀 ${topic}

Internet par abhi isi ki baat ho rahi hai. Log alag alag reactions de rahe hain aur discussion tezi se badh raha hai.

Follow karo daily updates ke liye ❤️

#viral #trendalert #contentcreator #socialmedia #exploremore #reelsinstagram #growthmindset #audience #viralvideo`
];

let randomCaption=captions[Math.floor(Math.random()*captions.length)];

document.getElementById("output").innerHTML=randomCaption.replace(/\n/g,"<br>");

}
</script>
</body>
</html>
