<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caption Lab - CreatorOS AI</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f9fc;
padding:20px;
margin:0;
}

.card{
background:white;
padding:20px;
border-radius:20px;
max-width:800px;
margin:auto;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

h1{
color:#00b7ff;
}

textarea{
width:100%;
height:120px;
padding:12px;
border-radius:12px;
border:1px solid #ddd;
margin-top:10px;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
background:#00c2ff;
color:white;
font-weight:bold;
border-radius:12px;
cursor:pointer;
}

.output{
margin-top:20px;
padding:15px;
background:#f8fbfd;
border-radius:12px;
border:2px dashed #00c2ff;
}
</style>
</head>

<body>

<div class="card">
<h1>Caption Lab ✨</h1>

<textarea id="topic" placeholder="Topic likho..."></textarea>

<button onclick="generateCaption()">
Generate Caption
</button>

<div class="output" id="output">
Generated caption yahan dikhega.
</div>
</div>

<script>
function generateCaption(){

let topic=document.getElementById("topic").value;

document.getElementById("output").innerHTML=
"🔥 " + topic +
"<br><br>Don't miss this amazing update! Follow for more. 🚀<br><br>#viral #trending #creatoros";

}
</script>

</body>
</html>
