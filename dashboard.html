<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CreatorOS AI — Dashboard</title>
<style>
  :root{ --bg:#0f0d17; --card:#1a1626; --lilac:#b399ff; --lilac-deep:#7c5cff; --text:#ece8f7; --muted:#9c93b8; --border:#2c2640; }
  *{box-sizing:border-box;}
  body{ margin:0; background:var(--bg); color:var(--text); font-family:-apple-system,'Segoe UI',Roboto,sans-serif; padding:20px; padding-bottom:60px;}
  .wrap{ max-width:480px; margin:0 auto; }
  .topbar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
  h1{ font-size:20px; margin:0; }
  .profile-chip{ font-size:11px; background:#241d38; color:var(--lilac); padding:6px 12px; border-radius:999px; }
  .card{ background:var(--card); border:1px solid var(--border); border-radius:16px; padding:16px; margin-bottom:16px; }
  textarea{ width:100%; background:#120f1d; border:1px solid var(--border); border-radius:12px; color:var(--text);
         padding:12px; font-size:14px; min-height:60px; font-family:inherit; }
  button{ width:100%; padding:14px; border:none; border-radius:12px; font-size:14px; font-weight:700;
          background:linear-gradient(90deg,var(--lilac-deep),var(--lilac)); color:#0f0d17; cursor:pointer; margin-top:10px; }
  pre{ background:#120f1d; border:1px solid var(--border); border-radius:12px; padding:14px; white-space:pre-wrap;
       font-family:inherit; font-size:13.5px; line-height:1.6; }
  .error{ color:#ff8a8a; font-size:12px; margin-top:10px; display:none; }
  .loading{ color:var(--muted); font-size:13px; display:none; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <h1>Dashboard</h1>
      <div class="profile-chip" id="profileChip">Loading...</div>
    </div>

    <div class="card">
      <label style="font-size:12px;color:var(--muted)">Aaj ka topic</label><br><br>
      <textarea id="topic" placeholder="Jaise: RM anniversary message, naya photo drop..."></textarea>
      <button onclick="gen()">Generate Script</button>
      <div class="loading" id="loading">Generating...</div>
      <div class="error" id="err">Script generate nahi hua, dobara try karo.</div>
    </div>

    <pre id="out" style="display:none"></pre>
  </div>

<script>
const BACKEND_URL = "http://localhost:3000";

async function loadProfile(){
  const email = localStorage.getItem("creatoros_email");
  if(!email){ window.location.href = "login.html"; return; }

  try{
    const res = await fetch(`${BACKEND_URL}/profile/${encodeURIComponent(email)}`);
    const user = await res.json();
    if(user.profile){
      document.getElementById("profileChip").textContent = `${user.profile.channel} · ${user.profile.niche}`;
    }
  }catch(e){
    document.getElementById("profileChip").textContent = "Offline";
  }
}

async function gen(){
  const email = localStorage.getItem("creatoros_email");
  const topic = document.getElementById("topic").value.trim();
  const err = document.getElementById("err");
  const loading = document.getElementById("loading");
  const out = document.getElementById("out");
  err.style.display = "none";
  out.style.display = "none";

  if(!topic){ err.textContent = "Topic daalo pehle."; err.style.display = "block"; return; }

  loading.style.display = "block";
  try{
    const res = await fetch(`${BACKEND_URL}/generate`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, topic })
    });
    const data = await res.json();
    loading.style.display = "none";

    if(data.error){ err.textContent = data.error; err.style.display = "block"; return; }

    out.textContent = data.script;
    out.style.display = "block";
  }catch(e){
    loading.style.display = "none";
    err.textContent = "Backend se connect nahi ho paya.";
    err.style.display = "block";
  }
}

loadProfile();
</script>
</body>
</html>
