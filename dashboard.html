<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>CreatorOS AI Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#090909;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;

}

.window{

width:100%;
max-width:1400px;
height:90vh;

background:#111111;

border:1px solid #2b2b2b;
border-radius:22px;

overflow:hidden;

box-shadow:0 0 40px rgba(0,0,0,.6);

display:flex;
flex-direction:column;

}

.topbar{

height:55px;

background:#1a1a1a;

display:flex;
align-items:center;

padding:0 20px;

border-bottom:1px solid #2c2c2c;

}

.dots{

display:flex;
gap:8px;

}

.dot{

width:12px;
height:12px;
border-radius:50%;

}

.red{background:#ff5f57;}
.yellow{background:#ffbd2f;}
.green{background:#28c840;}

.address{

margin:auto;

width:50%;

background:#2a2a2a;

padding:9px;

border-radius:30px;

text-align:center;

color:#999;

font-size:14px;

}

.content{

display:flex;

flex:1;

}

.sidebar{

width:240px;

background:#121212;

border-right:1px solid #2b2b2b;

padding:25px;

}

.logo{

font-size:28px;
font-weight:bold;

color:#f9c66a;

margin-bottom:40px;

}

.menu{

display:flex;
flex-direction:column;
gap:15px;

}

.menu a{

text-decoration:none;

color:#cfcfcf;

padding:12px 16px;

border-radius:12px;

transition:.3s;

}

.menu a:hover{

background:#1d1d1d;

color:#fff;

}

.main{

flex:1;

padding:25px;

}

.search{

background:#1d1d1d;

padding:15px;

border-radius:14px;

color:#777;

margin-bottom:25px;

}

.heading{

font-size:34px;

color:white;

font-weight:bold;

margin-bottom:10px;

}

.sub{

color:#7b7b7b;

font-size:15px;

}

.placeholder{

margin-top:40px;

height:420px;

border-radius:18px;

border:2px dashed #333;

display:flex;

align-items:center;

justify-content:center;

color:#555;

font-size:24px;

}

</style>

</head>

<body>

<div class="window">

<div class="topbar">

<div class="dots">

<div class="dot red"></div>

<div class="dot yellow"></div>

<div class="dot green"></div>

</div>

<div class="address">

🔒 creatoros.ai/dashboard

</div>

</div>

<div class="content">

<div class="sidebar">

<div class="logo">

CreatorOS AI

</div>

<div class="menu">

<a href="#">🏠 Home</a>

<a href="#">🤖 AI Studio</a>

<a href="#">📂 Projects</a>

<a href="#">📈 Analytics</a>

<a href="#">👥 Community</a>

<a href="#">⚙ Settings</a>

</div>

</div>

<div class="main">

<div class="search">

🔍 Search tools, projects, scripts...

</div>

<div class="heading">

AI Command & Growth Center

</div>

<div class="sub">

Everything you need to manage your creator business from one place.

</div>

<div class="placeholder">

Dashboard Widgets Coming in Part 2

</div>

</div>

</div>

</div>

</body>
</html>hai
