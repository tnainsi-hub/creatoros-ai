<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CreatorOS AI</title>
<style>
:root{--bg:#0f0d17;--card:#1a1626;--lilac:#b399ff;--lilac-deep:#7c5cff;--text:#ece8f7;--muted:#9c93b8;--border:#2c2640;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,'Segoe UI',Roboto,sans-serif;min-height:100vh;}
.page{display:none;padding:24px;max-width:420px;margin:0 auto;}
.page.active{display:block;}
h1{font-size:24px;margin:0 0 6px;background:linear-gradient(90deg,#fff,var(--lilac));-webkit-background-clip:text;background-clip:text;color:transparent;}
p{color:var(--muted);font-size:13px;margin:0 0 20px;line-height:1.5;}
label{font-size:12px;color:var(--muted);display:block;margin:14px 0 6px;}
input,select,textarea{width:100%;background:#120f1d;border:1px solid var(--border);border-radius:12px;color:var(--text);padding:13px;font-size:14px;font-family:inherit;}
textarea{min-height:60px;resize:none;}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:700;background:linear-gradient(90deg,var(--lilac-deep),var(--lilac));color:#0f0d17;cursor:pointer;margin-top:16px;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text);margin-top:10px;}
.error{color:#ff8a8a;font-size:12px;margin-top:8px;display:none;}
.eyebrow{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:#f0c46b;font-weight:700;margin-bottom:6px;}
.topbar{padding:20px 24px 14px;background:linear-gradient(160deg,#221a3a,#0f0d17 70%);border-bottom:1px solid var(--border);margin-bottom:20px;}
.chip{display:inline-block;font-size:12px;background:#241d38;color:var(--lilac);padding:5px 12px;border-radius:999px;margin-bottom:16px;}
.script-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:16px;}
.script-label{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--lilac);font-weight:700;margin-bottom:6px;}
.script-text{font-size:13.5px;line-height:1.6;white-space:pre-line;}
.tabs{display:flex;border-bottom:1px solid var(--border);margin:14px 0 10px;}
.tab{flex:1;text-align:center;padding:10px 4px;font-size:13px;font-weight:700;color:var(--muted);border-bottom:2px solid transparent;cursor:pointer;}
.tab.active{color:var(--lilac);border-color:var(--lilac);}
.panel{display:none;}.panel.active{display:block;}
.field{background:#120f1d;border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px;position:relative;}
.field-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;}
.field-text{font-size:13px;line-height:1.5;}
.copybtn{position:absolute;top:10px;right:10px;background:var(--lilac-deep);color:#fff;border:none;border-radius:8px;font-size:10px;padding:5px 9px;font-weight:700;cursor:pointer;}
.tag{display:inline-block;font-size:12px;background:#241d38;color:var(--lilac);padding:4px 9px;border-radius:8px;margin:3px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--lilac);color:#0f0d17;padding:10px 18px;border-radius:999px;font-size:13px;font-weight:700;opacity:0;transition:opacity .25s;pointer-events:none;}
.toast.show{opacity:1;}
.manager-card{background:linear-gradient(135deg,#241d38,#1a1626);border:1px solid var(--lilac-deep);border-radius:16px;padding:16px;margin-bottom:16px;font-size:13px;line-height:1.7;}
</style>
</head>
<body>

<!-- PAGE 1: LOGIN -->
<div class="page active" id="page-login">
  <div class="topbar">
    <div class="eyebrow">CreatorOS AI</div>
    <h1>Welcome Back 💜</h1>
    <p>Apna email daalo aur apna creator dashboard kholо</p>
  </div>
  <div style="padding:0 0 20px">
    <label>Email</label>
    <input id="login-email" type="email" placeholder="you@example.com">
    <div class="error" id="login-err">Valid email daalo.</div>
    <button class="btn" onclick="doLogin()">Login / Sign Up</button>
  </div>
</div>

<!-- PAGE 2: ONBOARDING -->
<div class="page" id="page-onboard">
  <div class="topbar">
    <div class="eyebrow">Step 2 of 2</div>
    <h1>Creator Profile</h1>
    <p>Yeh info AI ko batayegi tumhare liye scripts kaise banane hain</p>
  </div>
  <div style="padding:0 0 30px">
    <label>Tumhara Naam</label>
    <input id="ob-name" placeholder="Jaise: Nainsi Tiwari">
    <label>Channel / Page Naam</label>
    <input id="ob-channel" placeholder="Jaise: Boxy Smile Pop">
    <label>Platform</label>
    <select id="ob-platform">
      <option>YouTube</option>
      <option>Instagram</option>
      <option>Both</option>
    </select>
    <label>Niche</label>
    <input id="ob-niche" placeholder="BTS, Cricket, Cooking, Fashion...">
    <label>Content Style</label>
    <select id="ob-style">
      <option>Emotional</option>
      <option>News</option>
      <option>Funny</option>
      <option>Motivational</option>
      <option>Educational</option>
    </select>
    <label>Contact (optional)</label>
    <input id="ob-contact" placeholder="WhatsApp / Email">
    <div class="error" id="ob-err">Naam, channel aur niche zaroori hain.</div>
    <button class="btn" onclick="doSaveProfile()">Save & Continue →</button>
  </div>
</div>

<!-- PAGE 3: DASHBOARD -->
<div class="page" id="page-dash">
  <div class="topbar">
    <div class="eyebrow">CreatorOS AI · Dashboard</div>
    <h1>Script Lab</h1>
    <div id="dash-chip" class="chip">Loading...</div>
  </div>
  <div style="padding:0 0 40px">
    <label>Aaj ka topic / news</label>
    <textarea id="dash-topic" placeholder="Jaise: RM anniversary message, naya photo drop, tour announcement..."></textarea>
    <button class="btn" onclick="doGenerate()">✨ Generate 2 Scripts</button>
    <button class="btn btn-ghost" onclick="doLogout()">Logout</button>
    <div id="dash-results" style="margin-top:20px;"></div>
  </div>
</div>

<div class="toast" id="toast">Copied! ✓</div>

<script>
const BACKEND = "https://creatoros-ai.onrender.com";

// ── HELPERS ──
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  window.scrollTo(0,0);
}
function showToast(){
  const t=document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1400);
}
function copyText(text){
  try{
    if(navigator.clipboard){navigator.clipboard.writeText(text).then(showToast).catch(()=>fallback(text));}
    else fallback(text);
  }catch(e){fallback(text);}
}
function fallback(text){
  const ta=document.createElement('textarea');
  ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');showToast();}catch(e){}
  document.body.removeChild(ta);
}

// ── LOGIN ──
async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const err=document.getElementById('login-err');
  err.style.display='none';
  if(!email||!email.includes('@')){err.style.display='block';return;}
  localStorage.setItem('cos_email',email);
  try{
    const res=await fetch(BACKEND+'/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});
    const user=await res.json();
    if(user.profileCompleted){loadDash();showPage('dash');}
    else showPage('onboard');
  }catch(e){
    // backend down? check localStorage
    const prof=localStorage.getItem('cos_profile');
    if(prof){loadDash();showPage('dash');}
    else showPage('onboard');
  }
}

// ── ONBOARDING ──
async function doSaveProfile(){
  const name=document.getElementById('ob-name').value.trim();
  const channel=document.getElementById('ob-channel').value.trim();
  const niche=document.getElementById('ob-niche').value.trim();
  const err=document.getElementById('ob-err');
  err.style.display='none';
  if(!name||!channel||!niche){err.style.display='block';return;}
  const profile={name,channel,niche,
    platform:document.getElementById('ob-platform').value,
    style:document.getElementById('ob-style').value,
    contact:document.getElementById('ob-contact').value.trim()};
  localStorage.setItem('cos_profile',JSON.stringify(profile));
  const email=localStorage.getItem('cos_email');
  try{
    await fetch(BACKEND+'/save-profile',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,...profile})});
  }catch(e){}
  loadDash();showPage('dash');
}

// ── DASHBOARD ──
function loadDash(){
  const prof=JSON.parse(localStorage.getItem('cos_profile')||'{}');
  const chip=document.getElementById('dash-chip');
  if(prof.channel) chip.textContent=prof.channel+' · '+prof.niche;
  else chip.textContent='Creator Dashboard';
}

function doLogout(){
  localStorage.clear();showPage('login');
}

// ── SCRIPT GENERATION ──
const hooks={
  Emotional:["Yeh dekh ke Army ka dil pighal gaya 🥹💜","Is moment ko dekh ke aansu rok nahi paoge 😭","Kabhi socha nahi tha yeh din aayega... 💜"],
  News:["BREAKING: {niche} fans yeh sun ke shock ho gaye 😳","Yeh news abhi abhi aayi hai — {niche} community me tहलका 🔥","Wait karo — kya sach me yeh ho raha hai? 😱"],
  Funny:["POV: {niche} fan ka subah ka routine 😂","Yeh clip dekh ke hasna band nahi hoga 😭😂","Relatable hai toh like karo 💀"],
  Motivational:["Yeh story tumhari zindagi badal degi ✨","Aaj ka din alag hoga — yeh sun lo pehle 💜","Ek minute do, inspiration mil jayegi 🔥"],
  Educational:["90% {niche} fans ko yeh pata nahi tha 😳","Yeh fact jaanna zaroori hai 📚","Sikhlo yeh — kaam aayega 💡"]
};
const ctas=["Comment me batao — tumhara reaction kya tha? 💜 Follow karo for daily updates!","Agar tumhe bhi yeh pasand aaya toh like karo aur bestie ko tag karo 👇","Save kar lo isse, baar baar dekhna padega. Follow for more! 💜","Drop a 💜 comments me agar yeh dekh ke din ban gaya!"];
const igTags=["#BTS","#BTSArmy","#방탄소년단","#KpopNews","#Army","#BTSUpdate","#KpopEdit","#BangtanBoys","#BTSDaily","#Kpop"];
const ytTags=["BTS","BTS Army","방탄소년단","BTS news","BTS update 2026","Kpop news","BTS edit","Bangtan","BTS shorts","Army forever"];

function pickHook(style,niche){
  const arr=hooks[style]||hooks.News;
  return arr[Math.floor(Math.random()*arr.length)].replace('{niche}',niche||'Creator');
}
function pickCta(){return ctas[Math.floor(Math.random()*ctas.length)];}

function buildScript(topic,profile,variant){
  const hook=pickHook(profile.style,profile.niche);
  const cta=pickCta();
  const subject=topic||'Aaj ka trending moment';
  const scenes=variant===1?
`- Scene 1 (0-4s): Context dikhao — "${subject}" bold text overlay
- Scene 2 (4-14s): Sabse emotional/shocking visual, slow zoom
- Scene 3 (14-24s): Community reaction ya apna reaction cut-in
- Scene 4 (24-30s): Strongest quote ya line bada karke screen pe`:
`- Scene 1 (0-3s): Black screen + text reveal: "Yeh jaanna zaroori tha..."
- Scene 2 (3-14s): "${subject}" ka context line by line text overlay
- Scene 3 (14-24s): Then vs Now / Before vs After type comparison
- Scene 4 (24-30s): Emotional close + ${profile.channel} watermark`;

  return {
    script:`[0-3s] HOOK\n${hook}\n\n[3-25s] BODY — ${subject}\n${scenes}\nBackground: trending audio ya ${profile.niche} song snippet (15s)\nText: bold, center, max 5-6 words per line\n\n[25-35s] CTA\n${cta}`,
    igCaption:`${subject} 💜\n\nIs moment ko dekh ke tumhara dil bhi pighal gaya na? ${profile.niche} fan hone ka matlab hi yeh hai 🥹\n\n${cta}\n.\n.\n.`,
    igTags:[...igTags].sort(()=>0.5-Math.random()).slice(0,8).concat(['#'+profile.channel.replace(/\s/g,'')]),
    ytTitle:`${subject} 😳💜 | ${profile.niche} Reaction #shorts`,
    ytDesc:`${subject}\n\nIs video me dekho kya hua aur community kaise react kar rahi hai!\n\n💜 Subscribe: @${profile.channel}\n💜 Daily ${profile.niche} content\n\n${cta}`,
    ytTags:[...ytTags].sort(()=>0.5-Math.random()).slice(0,10),
    tip:variant===1?
      `Yeh script subah 10 AM post karo — peak ${profile.niche} audience time. Pehle 1 ghante me sab comments ka reply do.`:
      `Yeh script sham 7-8 PM ke liye save karo — ek topic se 2 posts, double coverage!`
  };
}

function renderScript(s,idx){
  const id='s'+idx;
  return `<div class="script-card">
  <div class="script-label">Script ${idx} of 2</div>
  <div class="manager-card">💜 <b>Manager Tip:</b> ${s.tip}</div>
  <div class="script-label">Shot Script (30-35s)</div>
  <div class="script-text">${s.script}</div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('ig-${id}','yt-${id}',this)">Instagram</div>
    <div class="tab" onclick="switchTab('yt-${id}','ig-${id}',this)">YouTube</div>
  </div>
  <div class="panel active" id="ig-${id}">
    <div class="field"><div class="field-label">Caption</div><button class="copybtn" onclick="copyText(document.getElementById('igc-${id}').innerText)">Copy</button><div class="field-text" id="igc-${id}">${s.igCaption}</div></div>
    <div class="field"><div class="field-label">Hashtags</div><button class="copybtn" onclick="copyText('${s.igTags.join(' ')}')">Copy</button><div>${s.igTags.map(t=>`<span class="tag">${t}</span>`).join('')}</div></div>
  </div>
  <div class="panel" id="yt-${id}">
    <div class="field"><div class="field-label">Title</div><button class="copybtn" onclick="copyText(document.getElementById('ytt-${id}').innerText)">Copy</button><div class="field-text" id="ytt-${id}">${s.ytTitle}</div></div>
    <div class="field"><div class="field-label">Description</div><button class="copybtn" onclick="copyText(document.getElementById('ytd-${id}').innerText)">Copy</button><div class="field-text" id="ytd-${id}">${s.ytDesc}</div></div>
    <div class="field"><div class="field-label">Tags</div><button class="copybtn" onclick="copyText('${s.ytTags.join(', ')}')">Copy</button><div>${s.ytTags.map(t=>`<span class="tag">${t}</span>`).join('')}</div></div>
  </div>
</div>`;
}

function switchTab(showId,hideId,el){
  document.getElementById(showId).classList.add('active');
  document.getElementById(hideId).classList.remove('active');
  const tabs=el.closest('.tabs').querySelectorAll('.tab');
  tabs.forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
}

async function doGenerate(){
  const topic=document.getElementById('dash-topic').value.trim();
  const profile=JSON.parse(localStorage.getItem('cos_profile')||'{}');
  if(!profile.channel){showPage('onboard');return;}
  const s1=buildScript(topic,profile,1);
  const s2=buildScript(topic,profile,2);
  const out=document.getElementById('dash-results');
  out.innerHTML=renderScript(s1,1)+renderScript(s2,2);
  out.scrollIntoView({behavior:'smooth'});
}

// ── INIT ──
window.onload=function(){
  const email=localStorage.getItem('cos_email');
  const profile=localStorage.getItem('cos_profile');
  if(email&&profile){loadDash();showPage('dash');}
  else showPage('login');
};
</script>
</body>
</html>
