<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CreatorOS AI — Login</title>
<style>
  :root{ --bg:#0f0d17; --card:#1a1626; --lilac:#b399ff; --lilac-deep:#7c5cff; --text:#ece8f7; --muted:#9c93b8; --border:#2c2640; }
  *{box-sizing:border-box;}
  body{ margin:0; background:var(--bg); color:var(--text); font-family:-apple-system,'Segoe UI',Roboto,sans-serif;
        min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .card{ background:var(--card); border:1px solid var(--border); border-radius:20px; padding:32px 24px; width:100%; max-width:380px; }
  h1{ font-size:22px; margin:0 0 6px; background:linear-gradient(90deg,#fff,var(--lilac)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  p{ color:var(--muted); font-size:13px; margin:0 0 24px; }
  input{ width:100%; background:#120f1d; border:1px solid var(--border); border-radius:12px; color:var(--text);
         padding:14px; font-size:14px; margin-bottom:14px; }
  button{ width:100%; padding:14px; border:none; border-radius:12px; font-size:14px; font-weight:700;
          background:linear-gradient(90deg,var(--lilac-deep),var(--lilac)); color:#0f0d17; cursor:pointer; }
  .error{ color:#ff8a8a; font-size:12px; margin-top:10px; display:none; }
</style>
</head>
<body>
  <div class="card">
    <h1>CreatorOS AI</h1>
    <p>Apna creator dashboard kholne ke liye email daalo</p>
    <input id="email" type="email" placeholder="you@example.com">
    <button onclick="login()">Login / Sign Up</button>
    <div class="error" id="err">Kuch galat hua, dobara try karo.</div>
  </div>

<script>
// ⚠️ Yahan apna live Render backend URL daalna — abhi localhost hai, sirf testing ke liye
const BACKEND_URL = "http://localhost:3000";

async function login(){
  const email = document.getElementById("email").value.trim();
  const err = document.getElementById("err");
  err.style.display = "none";

  if(!email){ err.textContent = "Email daalo."; err.style.display = "block"; return; }

  try{
    const res = await fetch(`${BACKEND_URL}/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email })
    });
    if(!res.ok) throw new Error("Server error");
    const user = await res.json();

    localStorage.setItem("creatoros_email", email);

    if(user.profileCompleted){
      window.location.href = "dashboard.html";
    } else {
      window.location.href = "onboarding.html";
    }
  }catch(e){
    err.textContent = "Backend se connect nahi ho paya. Backend URL check karo.";
    err.style.display = "block";
  }
}
</script>
</body>
</html>
