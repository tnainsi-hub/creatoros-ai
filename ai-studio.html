<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Studio - CreatorOS AI</title><style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f9fc;
color:#1f2937;
}

.header{
background:white;
padding:20px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.logo{
font-size:26px;
font-weight:bold;
color:#00b7ff;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.hero{
background:linear-gradient(135deg,#00c2ff,#66e3ff);
color:white;
padding:25px;
border-radius:20px;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:18px;
box-shadow:0 2px 10px rgba(0,0,0,.05);
margin-bottom:20px;
}

label{
display:block;
margin-bottom:8px;
font-weight:bold;
}

input,select,textarea{
width:100%;
padding:12px;
border:1px solid #dbe4ea;
border-radius:12px;
margin-bottom:15px;
font-size:15px;
box-sizing:border-box;
}

textarea{
height:120px;
resize:none;
}

.btn{
width:100%;
padding:14px;
background:#00c2ff;
color:white;
border:none;
border-radius:12px;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

.output{
background:#f8fbfd;
border:2px dashed #00c2ff;
border-radius:15px;
padding:20px;
min-height:150px;
line-height:1.7;
}

.footer{
text-align:center;
padding:25px;
color:#777;
}
</style></head><body><div class="header">
<div class="logo">CreatorOS AI</div>
</div><div class="container"><div class="hero">
<h1>AI Studio 🚀</h1>
<p>Create Shorts, Reels, Long Videos and Social Media Content.</p>
</div><div class="card"><label>Topic</label>
<input type="text" placeholder="Enter your topic...">

<label>Platform</label>
<select>

<option>YouTube</option>
<option>Instagram</option>
<option>Facebook</option>
<option>X (Twitter)</option>
</select><label>Content Type</label>
<select>

<option>YouTube Shorts</option>
<option>YouTube Long Video</option>
<option>Instagram Reel</option>
<option>Facebook Post</option>
<option>Twitter/X Post</option>
</select><label>Language</label>
<select>

<option>English</option>
<option>Hindi</option>
<option>Hinglish</option>
<option>Bengali</option>
<option>Tamil</option>
<option>Telugu</option>
<option>Marathi</option>
<option>Gujarati</option>
<option>Punjabi</option>
<option>Urdu</option>
<option>Spanish</option>
<option>French</option>
<option>German</option>
<option>Japanese</option>
<option>Korean</option>
<option>Chinese</option>
</select><button class="btn">
Generate Content
</button></div><div class="card"><h2>Generated Output</h2><div class="output">
Your AI generated script, caption, hashtags and ideas will appear here.
</div></div></div><div class="footer">
CreatorOS AI • AI Studio V1
</div></body>
</html>
